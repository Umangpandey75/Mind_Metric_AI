<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Brain silhouette with two gyri on top -->
  <path d="M 24 43
    C 16 43 7 38 6 30
    C 5 24 8 20 8 16
    C 7 12 9 8 13 8
    C 14 5 17 3 21 6
    C 22 3 26 3 27 6
    C 31 3 34 5 35 8
    C 39 8 41 12 40 16
    C 40 20 43 24 42 30
    C 41 38 32 43 24 43 Z"
    fill="url(#bg)"/>

  <!-- Corpus callosum (center divide) -->
  <path d="M 24 7 C 22 16 22 28 24 40"
    fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left fold -->
  <path d="M 10 23 C 13 18 16 17 17 22"
    fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right fold -->
  <path d="M 38 23 C 35 18 32 17 31 22"
    fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Upward graph trend line -->
  <polyline points="10,35 15,28 20,31 27,21 37,15"
    fill="none" stroke="white" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="10" cy="35" r="1.8" fill="white"/>
  <circle cx="15" cy="28" r="1.8" fill="white"/>
  <circle cx="20" cy="31" r="1.8" fill="white"/>
  <circle cx="27" cy="21" r="1.8" fill="white"/>
  <!-- Gold peak point -->
  <circle cx="37" cy="15" r="2.5" fill="#F59E0B"/>
</svg>
